<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Component Library</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Tenor+Sans&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --border: #222222;
    --border2: #2e2e2e;
    --text: #e8e8e8;
    --text2: #888888;
    --text3: #444444;
    --accent: #c8b89a;
    --accent2: #8a7a62;
    --green: #4a9a6a;
    --red: #9a4a4a;
    --blue: #4a6a9a;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LAYOUT ── */
  .app { display: flex; min-height: 100vh; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 240px;
    min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0;
    z-index: 100;
  }

  .sidebar-logo {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
  }
  .logo-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--text);
  }
  .logo-title span { color: var(--accent); }
  .logo-sub {
    font-family: 'Tenor Sans', sans-serif;
    font-size: 0.58rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text3);
    margin-top: 4px;
  }

  .sidebar-nav { padding: 16px 0; flex: 1; }
  .nav-section {
    padding: 8px 24px 4px;
    font-family: 'Tenor Sans', sans-serif;
    font-size: 0.58rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text3);
    margin-top: 8px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 24px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.82rem;
    color: var(--text2);
    border-left: 2px solid transparent;
  }
  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(200,184,154,0.05); }
  .nav-item .count {
    margin-left: auto;
    font-size: 0.68rem;
    color: var(--text3);
    background: var(--border);
    padding: 1px 7px;
    border-radius: 10px;
  }

  .sidebar-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
  }
  .btn-add {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    cursor: pointer;
    font-family: 'Tenor Sans', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: all 0.3s;
  }
  .btn-add:hover { background: #d4c8aa; }

  /* ── MAIN ── */
  .main {
    margin-left: 240px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* ── TOPBAR ── */
  .topbar {
    padding: 20px 36px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .search-wrap {
    flex: 1;
    max-width: 360px;
    position: relative;
  }
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 16px 9px 36px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.82rem;
    font-weight: 300;
    outline: none;
    transition: border-color 0.3s;
  }
  .search-input:focus { border-color: var(--accent2); }
  .search-input::placeholder { color: var(--text3); }
  .search-icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 0.85rem;
  }
  .view-toggle {
    display: flex;
    border: 1px solid var(--border);
  }
  .view-btn {
    padding: 8px 12px;
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .view-btn.active { background: var(--surface); color: var(--accent); }

  /* ── CONTENT ── */
  .content { padding: 32px 36px; }

  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 32px;
  }
  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.05em;
  }
  .page-title em { font-style: italic; color: var(--accent); }
  .page-count {
    font-size: 0.78rem;
    color: var(--text3);
    margin-top: 4px;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 2px;
  }
  .grid.list-view {
    grid-template-columns: 1fr;
    gap: 1px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
    transition: border-color 0.3s, transform 0.2s;
    cursor: pointer;
  }
  .card:hover { border-color: var(--border2); }

  .card-preview {
    height: 180px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid var(--border);
  }
  .list-view .card-preview { height: 80px; width: 120px; border-bottom: none; border-right: 1px solid var(--border); flex-shrink: 0; }
  .list-view .card { display: flex; }
  .list-view .card-body { flex: 1; padding: 16px 20px; display: flex; align-items: center; gap: 20px; }

  .preview-label {
    font-family: 'Tenor Sans', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
    position: absolute;
    top: 10px; left: 12px;
  }

  /* Live previews */
  .preview-line-drop {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .preview-line-wrap {
    width: 1px; height: 60px;
    background: rgba(255,255,255,0.08);
    position: relative; overflow: hidden;
  }
  .preview-line-inner {
    position: absolute; top: 0; left: 0;
    width: 1px; height: 100%;
    background: linear-gradient(to bottom, transparent 0%, #c8b89a 40%, #fff 60%, transparent 100%);
    animation: previewDrop 2s ease-in-out infinite;
  }
  @keyframes previewDrop {
    0%   { transform: translateY(-100%); opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(100%); opacity: 0; }
  }
  .preview-scroll-label {
    font-family: 'Tenor Sans', sans-serif;
    font-size: 7px; letter-spacing: 0.3em;
    text-transform: uppercase; color: rgba(200,184,154,0.5);
    writing-mode: vertical-rl;
  }

  .preview-cursor {
    position: relative; width: 60px; height: 60px;
  }
  .preview-dot {
    width: 6px; height: 6px; background: #c8b89a;
    border-radius: 50%; position: absolute;
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    animation: cursorPulse 2s ease-in-out infinite;
  }
  .preview-ring {
    width: 28px; height: 28px;
    border: 1px solid rgba(200,184,154,0.4);
    border-radius: 50%; position: absolute;
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    animation: ringPulse 2s ease-in-out infinite;
  }
  @keyframes cursorPulse {
    0%,100% { transform: translate(-50%,-50%) scale(1); }
    50% { transform: translate(-50%,-50%) scale(1.3); }
  }
  @keyframes ringPulse {
    0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
    50% { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
  }

  .preview-fadein {
    display: flex; flex-direction: column; gap: 8px; padding: 10px;
  }
  .preview-fadein-bar {
    height: 6px; border-radius: 2px; background: var(--border2);
    animation: fadeInBar 2s ease-in-out infinite;
  }
  .preview-fadein-bar:nth-child(1) { width: 80%; animation-delay: 0s; }
  .preview-fadein-bar:nth-child(2) { width: 60%; animation-delay: 0.15s; }
  .preview-fadein-bar:nth-child(3) { width: 70%; animation-delay: 0.3s; }
  .preview-fadein-bar:nth-child(4) { width: 45%; animation-delay: 0.45s; }
  @keyframes fadeInBar {
    0%,100% { opacity: 0.2; transform: translateY(6px); }
    40%,70% { opacity: 1; transform: translateY(0); }
  }

  .preview-parallax {
    width: 100%; height: 100%;
    background: linear-gradient(160deg, #1a1410 0%, #2a1e10 50%, #0a0806 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .parallax-layer1 {
    position: absolute; inset: -10%;
    background: radial-gradient(ellipse at 40% 50%, rgba(200,184,154,0.15) 0%, transparent 60%);
    animation: parallaxMove 4s ease-in-out infinite alternate;
  }
  @keyframes parallaxMove {
    from { transform: translateY(-8px) scale(1.05); }
    to   { transform: translateY(8px) scale(1); }
  }
  .parallax-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem; font-style: italic;
    color: rgba(200,184,154,0.6); letter-spacing: 0.1em;
    position: relative; z-index: 1;
  }

  .preview-hover {
    display: flex; gap: 8px;
  }
  .hover-btn {
    padding: 6px 14px;
    border: 1px solid rgba(200,184,154,0.3);
    font-family: 'Tenor Sans', sans-serif;
    font-size: 8px; letter-spacing: 0.2em;
    text-transform: uppercase; color: rgba(200,184,154,0.6);
    position: relative; overflow: hidden; cursor: pointer;
    background: none;
    animation: hoverDemo 3s ease-in-out infinite;
  }
  .hover-btn::before {
    content: ''; position: absolute; inset: 0;
    background: var(--accent);
    transform: translateX(-101%);
    animation: hoverFill 3s ease-in-out infinite;
  }
  .hover-btn span { position: relative; z-index: 1; }
  @keyframes hoverDemo {
    0%,30%,100% { color: rgba(200,184,154,0.6); }
    40%,80% { color: #0a0a0a; }
  }
  @keyframes hoverFill {
    0%,25% { transform: translateX(-101%); }
    40%,80% { transform: translateX(0); }
    95%,100% { transform: translateX(101%); }
  }

  .card-body { padding: 18px 20px; }
  .list-view .card-body { padding: 0 20px; }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem; font-weight: 300;
    color: var(--text); line-height: 1.2;
  }
  .card-name em { font-style: italic; color: var(--accent); }

  .card-tag {
    font-family: 'Tenor Sans', sans-serif;
    font-size: 0.58rem; letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid var(--border2);
    color: var(--text3);
  }
  .card-tag.animation { border-color: rgba(200,184,154,0.3); color: var(--accent2); }
  .card-tag.cursor { border-color: rgba(74,154,106,0.3); color: var(--green); }
  .card-tag.layout { border-color: rgba(74,106,154,0.3); color: var(--blue); }
  .card-tag.effect { border-color: rgba(154,74,74,0.3); color: var(--red); }

  .card-desc {
    font-size: 0.78rem; color: var(--text2);
    line-height: 1.7; margin-bottom: 14px;
  }
  .list-view .card-desc { margin-bottom: 0; }

  .card-meta {
    display: flex; align-items: center; gap: 12px;
    font-size: 0.7rem; color: var(--text3);
  }
  .card-platform {
    display: flex; gap: 4px;
  }
  .platform-badge {
    padding: 2px 6px;
    background: var(--surface2);
    font-family: 'Tenor Sans', sans-serif;
    font-size: 0.58rem; letter-spacing: 0.1em;
    color: var(--text3);
  }

  .card-actions {
    display: flex; gap: 1px; margin-top: 14px;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }
  .list-view .card-actions { margin-top: 0; border-top: none; padding-top: 0; margin-left: auto; flex-shrink: 0; }

  .action-btn {
    flex: 1; padding: 8px;
    background: none; border: 1px solid var(--border);
    color: var(--text2); cursor: pointer;
    font-family: 'Tenor Sans', sans-serif;
    font-size: 0.62rem; letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: all 0.25s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .action-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }
  .action-btn.copy-btn:hover { color: var(--accent); border-color: var(--accent2); }
  .action-btn.copied { color: var(--green) !important; border-color: var(--green) !important; }

  /* ── MODAL ── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: none;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    width: 100%; max-width: 680px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-header {
    padding: 24px 28px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem; font-weight: 300;
  }
  .modal-close {
    background: none; border: none; color: var(--text3);
    cursor: pointer; font-size: 1.2rem; padding: 4px;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--text); }

  .modal-body { padding: 28px; }

  .form-group { margin-bottom: 20px; }
  .form-label {
    display: block;
    font-family: 'Tenor Sans', sans-serif;
    font-size: 0.62rem; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--accent);
    margin-bottom: 8px;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.82rem; font-weight: 300;
    outline: none;
    transition: border-color 0.3s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent2); }
  .form-textarea { resize: vertical; min-height: 200px; font-family: 'Courier New', monospace; font-size: 0.75rem; line-height: 1.6; }
  .form-select option { background: var(--surface2); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .modal-footer {
    padding: 20px 28px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
  }
  .btn {
    padding: 10px 24px;
    font-family: 'Tenor Sans', sans-serif;
    font-size: 0.68rem; letter-spacing: 0.2em;
    text-transform: uppercase; cursor: pointer;
    border: 1px solid; transition: all 0.3s;
  }
  .btn-ghost { background: none; border-color: var(--border2); color: var(--text2); }
  .btn-ghost:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .btn-primary:hover { background: #d4c8aa; }

  /* ── CODE MODAL ── */
  .code-modal { max-width: 780px; }
  .code-block {
    background: #0d0d0d;
    border: 1px solid var(--border);
    padding: 20px;
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    line-height: 1.7;
    color: #c8c8b8;
    overflow-x: auto;
    white-space: pre;
    max-height: 400px;
    overflow-y: auto;
  }
  .code-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .code-lang {
    font-family: 'Tenor Sans', sans-serif;
    font-size: 0.6rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--accent);
  }

  /* ── EMPTY ── */
  .empty-state {
    text-align: center; padding: 80px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.3; }
  .empty-text { font-size: 0.9rem; line-height: 1.8; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 32px; right: 32px;
    background: var(--surface);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 12px 20px;
    font-family: 'Tenor Sans', sans-serif;
    font-size: 0.7rem; letter-spacing: 0.15em;
    text-transform: uppercase;
    transform: translateY(100px); opacity: 0;
    transition: all 0.3s ease;
    z-index: 999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 3px; height: 3px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); }
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-title">COMP<span>.</span>LIB</div>
      <div class="logo-sub">Component Library</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">ライブラリ</div>
      <div class="nav-item active" data-filter="all" onclick="filterComponents('all', this)">
        <span>📦</span> すべて <span class="count" id="count-all">0</span>
      </div>
      <div class="nav-section">カテゴリ</div>
      <div class="nav-item" data-filter="animation" onclick="filterComponents('animation', this)">
        <span>✦</span> アニメーション <span class="count" id="count-animation">0</span>
      </div>
      <div class="nav-item" data-filter="cursor" onclick="filterComponents('cursor', this)">
        <span>◎</span> カーソル <span class="count" id="count-cursor">0</span>
      </div>
      <div class="nav-item" data-filter="layout" onclick="filterComponents('layout', this)">
        <span>▦</span> レイアウト <span class="count" id="count-layout">0</span>
      </div>
      <div class="nav-item" data-filter="effect" onclick="filterComponents('effect', this)">
        <span>◈</span> エフェクト <span class="count" id="count-effect">0</span>
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-add" onclick="openAddModal()">＋ 新規追加</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" placeholder="コンポーネントを検索..." id="searchInput" oninput="searchComponents()">
      </div>
      <div class="view-toggle">
        <button class="view-btn active" id="gridBtn" onclick="setView('grid')" title="グリッド">⊞</button>
        <button class="view-btn" id="listBtn" onclick="setView('list')" title="リスト">☰</button>
      </div>
    </div>

    <div class="content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Component <em>Library</em></h1>
          <p class="page-count" id="pageCount">0 コンポーネント</p>
        </div>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </main>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-backdrop" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">新規コンポーネント</h2>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">コンポーネント名</label>
          <input class="form-input" id="compName" placeholder="例: Line Drop">
        </div>
        <div class="form-group">
          <label class="form-label">カテゴリ</label>
          <select class="form-select" id="compCategory">
            <option value="animation">アニメーション</option>
            <option value="cursor">カーソル</option>
            <option value="layout">レイアウト</option>
            <option value="effect">エフェクト</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">説明</label>
        <input class="form-input" id="compDesc" placeholder="例: スクロールを誘導する縦線フローアニメーション">
      </div>
      <div class="form-group">
        <label class="form-label">対応プラットフォーム</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
          <label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--text2);cursor:pointer">
            <input type="checkbox" id="plt-wix" value="Wix" checked style="accent-color:var(--accent)"> Wix
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--text2);cursor:pointer">
            <input type="checkbox" id="plt-webflow" value="Webflow" style="accent-color:var(--accent)"> Webflow
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--text2);cursor:pointer">
            <input type="checkbox" id="plt-framer" value="Framer" style="accent-color:var(--accent)"> Framer
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--text2);cursor:pointer">
            <input type="checkbox" id="plt-html" value="HTML" checked style="accent-color:var(--accent)"> HTML
          </label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">コード</label>
        <textarea class="form-textarea" id="compCode" placeholder="HTMLコード・CSSコード・JSコードを貼り付け..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAddModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveComponent()">保存する</button>
    </div>
  </div>
</div>

<!-- CODE VIEW MODAL -->
<div class="modal-backdrop" id="codeModal">
  <div class="modal code-modal">
    <div class="modal-header">
      <h2 class="modal-title" id="codeModalTitle"></h2>
      <button class="modal-close" onclick="closeCodeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="code-header">
        <span class="code-lang">HTML / CSS / JS</span>
        <button class="btn btn-ghost" style="padding:6px 16px;font-size:0.62rem" onclick="copyFromModal()" id="copyModalBtn">コピー</button>
      </div>
      <pre class="code-block" id="codeBlock"></pre>
      <div style="margin-top:16px;padding:14px;background:var(--surface2);border:1px solid var(--border)">
        <p style="font-family:'Tenor Sans',sans-serif;font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:8px">使い方</p>
        <p style="font-size:0.8rem;color:var(--text2);line-height:1.8" id="codeUsage"></p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeCodeModal()">閉じる</button>
      <button class="btn btn-primary" onclick="copyFromModal()">コードをコピー</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✓ コードをコピーしました</div>

<script>
// ── DEFAULT COMPONENTS ──
const DEFAULT_COMPONENTS = [
  {
    id: 'line-drop',
    name: 'Line Drop',
    category: 'animation',
    desc: 'スクロールを誘導する縦線フローアニメーション。光が上から下へ滑らかに流れる。',
    platforms: ['Wix', 'Webflow', 'HTML'],
    preview: 'line-drop',
    usage: 'Wix: HTML埋め込みウィジェットに貼り付け → ヒーローセクションの右下に配置\nWebflow: Embed要素に貼り付け\nHTML: <body>内の任意の場所に配置',
    code: `<style>
  .scroll-indicator {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .scroll-line-wrap {
    width: 1px;
    height: 80px;
    background: rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
  }
  .scroll-line-inner {
    position: absolute;
    top: 0; left: 0;
    width: 1px; height: 100%;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      #c8b89a 40%,
      #ffffff 60%,
      transparent 100%
    );
    animation: scrollFlow 2s ease-in-out infinite;
  }
  @keyframes scrollFlow {
    0%   { transform: translateY(-100%); opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(100%); opacity: 0; }
  }
  .scroll-label {
    font-family: 'Tenor Sans', sans-serif;
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(200, 184, 154, 0.6);
    writing-mode: vertical-rl;
  }
</style>

<div class="scroll-indicator">
  <div class="scroll-line-wrap">
    <div class="scroll-line-inner"></div>
  </div>
  <span class="scroll-label">Scroll</span>
</div>`
  },
  {
    id: 'custom-cursor',
    name: 'Custom Cursor',
    category: 'cursor',
    desc: 'ブランドカラーのドットとリングが追従するカスタムカーソル。ホバー時に拡大する。',
    platforms: ['Wix', 'Webflow', 'HTML'],
    preview: 'cursor',
    usage: 'Wix: HTML埋め込みウィジェットとしてページに追加\nWebflow/HTML: <body>の直後に配置。CSSのcursor:noneをbodyに追加する。',
    code: `<style>
  body { cursor: none; }
  .cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: #c8b89a;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s;
  }
  .cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border: 1px solid rgba(200,184,154,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: width 0.35s ease, height 0.35s ease;
  }
</style>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<script>
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  function animate() {
    cursor.style.left = mx + 'px';
    cursor.style.top = my + 'px';
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
    requestAnimationFrame(animate);
  }
  animate();
  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => {
      cursor.style.width = '14px';
      cursor.style.height = '14px';
      ring.style.width = '56px';
      ring.style.height = '56px';
    });
    el.addEventListener('mouseleave', () => {
      cursor.style.width = '8px';
      cursor.style.height = '8px';
      ring.style.width = '36px';
      ring.style.height = '36px';
    });
  });
<\/script>`
  },
  {
    id: 'scroll-reveal',
    name: 'Scroll Reveal',
    category: 'animation',
    desc: '要素がスクロールに応じてフェードインしながら登場するアニメーション。',
    platforms: ['Wix', 'Webflow', 'HTML'],
    preview: 'fadein',
    usage: 'フェードインさせたい要素に class="reveal" を追加するだけ。\nWix: Velo（カスタムJS）に貼り付け。',
    code: `<style>
  .reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }
</style>

<script>
  const observer = new IntersectionObserver(entries => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 80);
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
<\/script>

<!-- 使用例: フェードインさせたい要素に class="reveal" を追加 -->
<div class="reveal">
  <h2>このテキストがフェードインします</h2>
</div>`
  },
  {
    id: 'parallax-hero',
    name: 'Parallax Hero',
    category: 'effect',
    desc: 'スクロールに応じて背景画像がゆっくり動く視差効果。ヒーローセクション向け。',
    platforms: ['Webflow', 'HTML'],
    preview: 'parallax',
    usage: 'Webflow: Background Image設定で「Parallax」を選択するだけ。\nHTML: .hero-bgにこのCSSを適用。',
    code: `<style>
  .hero {
    height: 100vh;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
  }
  .hero-bg {
    position: absolute;
    inset: -20%;
    background-image: url('your-image.jpg');
    background-size: cover;
    background-position: center;
    will-change: transform;
  }
</style>

<section class="hero">
  <div class="hero-bg" id="heroBg"></div>
  <div style="position:relative;z-index:2;">
    <h1>ヒーロータイトル</h1>
  </div>
</section>

<script>
  const bg = document.getElementById('heroBg');
  window.addEventListener('scroll', () => {
    const y = window.scrollY;
    bg.style.transform = 'translateY(' + (y * 0.4) + 'px)';
  }, { passive: true });
<\/script>`
  },
  {
    id: 'hover-fill-btn',
    name: 'Hover Fill Button',
    category: 'effect',
    desc: 'ホバーで背景色が左からスライドして塗りつぶされるボタンエフェクト。',
    platforms: ['Wix', 'Webflow', 'HTML'],
    preview: 'hover',
    usage: 'ボタン要素にこのCSSクラスを適用するだけ。\nWix: HTMLコードとして埋め込むか、CSSをカスタムCSSに追加。',
    code: `<style>
  .btn-fill {
    display: inline-block;
    padding: 14px 36px;
    font-family: sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #f8f8f8;
    border: 1px solid rgba(255,255,255,0.3);
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: color 0.4s ease;
    cursor: pointer;
    background: none;
  }
  .btn-fill::before {
    content: '';
    position: absolute;
    inset: 0;
    background: #c8b89a;
    transform: translateX(-101%);
    transition: transform 0.4s ease;
    z-index: 0;
  }
  .btn-fill:hover { color: #0a0a0a; border-color: #c8b89a; }
  .btn-fill:hover::before { transform: translateX(0); }
  .btn-fill span { position: relative; z-index: 1; }
</style>

<button class="btn-fill">
  <span>View More</span>
</button>`
  }
];

// ── STATE ──
let components = [];
let currentFilter = 'all';
let currentView = 'grid';
let editingId = null;

// ── STORAGE ──
function save() {
  localStorage.setItem('comp_lib', JSON.stringify(components));
}

function load() {
  try {
    const stored = localStorage.getItem('comp_lib');
    if (stored) {
      components = JSON.parse(stored);
    } else {
      components = [...DEFAULT_COMPONENTS];
      save();
    }
  } catch(e) {
    components = [...DEFAULT_COMPONENTS];
  }
}

// ── RENDER ──
function getPreviewHTML(comp) {
  const type = comp.preview || comp.category;
  switch(type) {
    case 'line-drop':
      return `<div class="preview-line-drop">
        <div class="preview-line-wrap"><div class="preview-line-inner"></div></div>
        <span class="preview-scroll-label">Scroll</span>
      </div>`;
    case 'cursor':
      return `<div class="preview-cursor">
        <div class="preview-ring"></div>
        <div class="preview-dot"></div>
      </div>`;
    case 'fadein':
    case 'animation':
      return `<div class="preview-fadein">
        <div class="preview-fadein-bar"></div>
        <div class="preview-fadein-bar"></div>
        <div class="preview-fadein-bar"></div>
        <div class="preview-fadein-bar"></div>
      </div>`;
    case 'parallax':
      return `<div class="preview-parallax">
        <div class="parallax-layer1"></div>
        <span class="parallax-text">Parallax</span>
      </div>`;
    case 'hover':
    case 'effect':
      return `<div class="preview-hover">
        <button class="hover-btn"><span>Click</span></button>
      </div>`;
    default:
      return `<span style="font-size:2rem;opacity:0.2">{ }</span>`;
  }
}

function getCategoryLabel(cat) {
  const map = { animation: 'アニメーション', cursor: 'カーソル', layout: 'レイアウト', effect: 'エフェクト' };
  return map[cat] || cat;
}

function renderCard(comp) {
  const platforms = (comp.platforms || []).map(p => `<span class="platform-badge">${p}</span>`).join('');
  return `
    <div class="card" data-id="${comp.id}">
      <div class="card-preview">
        <span class="preview-label">Preview</span>
        ${getPreviewHTML(comp)}
      </div>
      <div class="card-body">
        <div class="card-header">
          <h3 class="card-name">${comp.name}</h3>
          <span class="card-tag ${comp.category}">${getCategoryLabel(comp.category)}</span>
        </div>
        <p class="card-desc">${comp.desc}</p>
        <div class="card-meta">
          <div class="card-platform">${platforms}</div>
        </div>
        <div class="card-actions">
          <button class="action-btn copy-btn" onclick="copyCode('${comp.id}', this)">📋 コピー</button>
          <button class="action-btn" onclick="viewCode('${comp.id}')">👁 コード</button>
          <button class="action-btn" onclick="editComponent('${comp.id}')">✏ 編集</button>
          <button class="action-btn" onclick="deleteComponent('${comp.id}')" style="flex:0;padding:8px 10px;color:var(--red)">🗑</button>
        </div>
      </div>
    </div>`;
}

function render() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtered = components.filter(c => {
    const matchCat = currentFilter === 'all' || c.category === currentFilter;
    const matchSearch = !search || c.name.toLowerCase().includes(search) || c.desc.toLowerCase().includes(search);
    return matchCat && matchSearch;
  });

  const grid = document.getElementById('grid');
  grid.className = 'grid' + (currentView === 'list' ? ' list-view' : '');

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">📦</div>
      <p class="empty-text">コンポーネントがありません<br>「新規追加」から追加してください</p>
    </div>`;
  } else {
    grid.innerHTML = filtered.map(renderCard).join('');
  }

  document.getElementById('pageCount').textContent = `${filtered.length} コンポーネント`;

  // Update counts
  document.getElementById('count-all').textContent = components.length;
  ['animation','cursor','layout','effect'].forEach(cat => {
    document.getElementById('count-' + cat).textContent = components.filter(c => c.category === cat).length;
  });
}

// ── ACTIONS ──
function copyCode(id, btn) {
  const comp = components.find(c => c.id === id);
  if (!comp) return;
  navigator.clipboard.writeText(comp.code).then(() => {
    btn.textContent = '✓ コピー済み';
    btn.classList.add('copied');
    showToast('コードをコピーしました');
    setTimeout(() => {
      btn.textContent = '📋 コピー';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function viewCode(id) {
  const comp = components.find(c => c.id === id);
  if (!comp) return;
  document.getElementById('codeModalTitle').textContent = comp.name;
  document.getElementById('codeBlock').textContent = comp.code;
  document.getElementById('codeUsage').textContent = comp.usage || 'コード内のコメントを参照してください。';
  document.getElementById('codeModal').setAttribute('data-id', id);
  document.getElementById('codeModal').classList.add('open');
}

function copyFromModal() {
  const id = document.getElementById('codeModal').getAttribute('data-id');
  const comp = components.find(c => c.id === id);
  if (!comp) return;
  navigator.clipboard.writeText(comp.code).then(() => {
    showToast('コードをコピーしました');
    const btn = document.getElementById('copyModalBtn');
    btn.textContent = '✓ コピー済み';
    setTimeout(() => btn.textContent = 'コピー', 2000);
  });
}

function closeCodeModal() {
  document.getElementById('codeModal').classList.remove('open');
}

function editComponent(id) {
  const comp = components.find(c => c.id === id);
  if (!comp) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'コンポーネントを編集';
  document.getElementById('compName').value = comp.name;
  document.getElementById('compCategory').value = comp.category;
  document.getElementById('compDesc').value = comp.desc;
  document.getElementById('compCode').value = comp.code;
  ['wix','webflow','framer','html'].forEach(p => {
    document.getElementById('plt-' + p).checked = (comp.platforms || []).includes(p.charAt(0).toUpperCase() + p.slice(1));
  });
  document.getElementById('addModal').classList.add('open');
}

function deleteComponent(id) {
  if (!confirm('このコンポーネントを削除しますか？')) return;
  components = components.filter(c => c.id !== id);
  save();
  render();
  showToast('削除しました');
}

function filterComponents(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  render();
}

function searchComponents() { render(); }

function setView(view) {
  currentView = view;
  document.getElementById('gridBtn').classList.toggle('active', view === 'grid');
  document.getElementById('listBtn').classList.toggle('active', view === 'list');
  render();
}

// ── ADD / SAVE ──
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '新規コンポーネント';
  document.getElementById('compName').value = '';
  document.getElementById('compCategory').value = 'animation';
  document.getElementById('compDesc').value = '';
  document.getElementById('compCode').value = '';
  ['wix','webflow','framer','html'].forEach(p => {
    document.getElementById('plt-' + p).checked = p === 'wix' || p === 'html';
  });
  document.getElementById('addModal').classList.add('open');
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
  editingId = null;
}

function saveComponent() {
  const name = document.getElementById('compName').value.trim();
  const category = document.getElementById('compCategory').value;
  const desc = document.getElementById('compDesc').value.trim();
  const code = document.getElementById('compCode').value.trim();
  const platforms = ['Wix','Webflow','Framer','HTML'].filter((p, i) =>
    document.getElementById('plt-' + p.toLowerCase()).checked
  );

  if (!name || !code) {
    alert('名前とコードは必須です');
    return;
  }

  if (editingId) {
    const idx = components.findIndex(c => c.id === editingId);
    if (idx !== -1) {
      components[idx] = { ...components[idx], name, category, desc, code, platforms };
    }
  } else {
    const id = name.toLowerCase().replace(/\s+/g, '-') + '-' + Date.now();
    components.push({ id, name, category, desc, code, platforms, preview: category });
  }

  save();
  render();
  closeAddModal();
  showToast(editingId ? '更新しました' : '追加しました');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✓ ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── CLOSE ON BACKDROP ──
document.getElementById('addModal').addEventListener('click', function(e) {
  if (e.target === this) closeAddModal();
});
document.getElementById('codeModal').addEventListener('click', function(e) {
  if (e.target === this) closeCodeModal();
});

// ── INIT ──
load();
render();
</script>
</body>
</html>
